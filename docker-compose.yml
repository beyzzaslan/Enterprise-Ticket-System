version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticket_app
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/enterprise_ticket_system
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-3600000}
      - JWT_ISSUER=${JWT_ISSUER:-enterprise-ticket-system}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-enterprise-ticket-system-client}
      - JWT_REFRESH_DAYS=${JWT_REFRESH_DAYS:-30}
      - AUTH_LOGIN_MAX_ATTEMPTS=${AUTH_LOGIN_MAX_ATTEMPTS:-5}
      - AUTH_LOGIN_BLOCK_MINUTES=${AUTH_LOGIN_BLOCK_MINUTES:-15}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - APP_SEED_ADMIN_ENABLED=${APP_SEED_ADMIN_ENABLED:-true}
      - APP_SEED_ADMIN_EMAIL=${APP_SEED_ADMIN_EMAIL:-admin@local}
      - APP_SEED_ADMIN_PASSWORD=${APP_SEED_ADMIN_PASSWORD:-Admin123!}
      - APP_SEED_ADMIN_FULL_NAME=${APP_SEED_ADMIN_FULL_NAME:-Admin}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db
    restart: unless-stopped


  db:
    image: postgres:16
    container_name: ticket_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=enterprise_ticket_system
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
