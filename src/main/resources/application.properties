spring.application.name=enterprise-ticket-system

spring.datasource.url=jdbc:postgresql://localhost:5433/enterprise_ticket_system
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT SETTINGS (load from env/secret store; DO NOT COMMIT real keys)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
jwt.issuer=${JWT_ISSUER:enterprise-ticket-system}
jwt.audience=${JWT_AUDIENCE:enterprise-ticket-system-client}
jwt.refresh-days=${JWT_REFRESH_DAYS:30}

# Login protection
auth.login.max-attempts=${AUTH_LOGIN_MAX_ATTEMPTS:5}
auth.login.block-minutes=${AUTH_LOGIN_BLOCK_MINUTES:15}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

# Seed Data Configuration
app.seed.enabled=true
app.seed.admin.enabled=true
app.seed.admin.email=admin@local
app.seed.admin.password=Admin123!
app.seed.admin.name=Admin
app.seed.admin.surname=User